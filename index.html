<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>단위 변환기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <h1>단위 변환기</h1>
    <p class="site-description">길이 · 무게 · 부피 · 온도 · 속도 · 면적 · 데이터 크기를 간편하게 변환하세요</p>
  </header>

  <main class="converter-container">

    <!-- 길이 변환 섹션 -->
    <section class="converter-section" id="section-length">
      <h2 class="section-title">📏 길이 변환</h2>
      <div class="converter-form">
        <input
          type="number"
          id="length-input"
          class="value-input"
          placeholder="값 입력"
          step="any"
        />
        <select id="length-from" class="unit-select">
          <option value="cm">cm (센티미터)</option>
          <option value="m">m (미터)</option>
          <option value="km">km (킬로미터)</option>
          <option value="inch">inch (인치)</option>
          <option value="feet">feet (피트)</option>
          <option value="mile">mile (마일)</option>
        </select>
        <span class="arrow-label">→</span>
        <select id="length-to" class="unit-select">
          <option value="cm">cm (센티미터)</option>
          <option value="m">m (미터)</option>
          <option value="km">km (킬로미터)</option>
          <option value="inch" selected>inch (인치)</option>
          <option value="feet">feet (피트)</option>
          <option value="mile">mile (마일)</option>
        </select>
        <button class="convert-button" id="length-button">변환</button>
        <span class="result-display" id="length-result"></span>
      </div>
    </section>

    <!-- 무게 변환 섹션 -->
    <section class="converter-section" id="section-weight">
      <h2 class="section-title">⚖️ 무게 변환</h2>
      <div class="converter-form">
        <input
          type="number"
          id="weight-input"
          class="value-input"
          placeholder="값 입력"
          step="any"
        />
        <select id="weight-from" class="unit-select">
          <option value="kg">kg (킬로그램)</option>
          <option value="lb">lb (파운드)</option>
        </select>
        <span class="arrow-label">→</span>
        <select id="weight-to" class="unit-select">
          <option value="kg">kg (킬로그램)</option>
          <option value="lb" selected>lb (파운드)</option>
        </select>
        <button class="convert-button" id="weight-button">변환</button>
        <span class="result-display" id="weight-result"></span>
      </div>
    </section>

    <!-- 부피 변환 섹션 -->
    <section class="converter-section" id="section-volume">
      <h2 class="section-title">🧪 부피 변환</h2>
      <div class="converter-form">
        <input
          type="number"
          id="volume-input"
          class="value-input"
          placeholder="값 입력"
          step="any"
        />
        <select id="volume-from" class="unit-select">
          <option value="L">L (리터)</option>
          <option value="gal">gal (갤런)</option>
        </select>
        <span class="arrow-label">→</span>
        <select id="volume-to" class="unit-select">
          <option value="L">L (리터)</option>
          <option value="gal" selected>gal (갤런)</option>
        </select>
        <button class="convert-button" id="volume-button">변환</button>
        <span class="result-display" id="volume-result"></span>
      </div>
    </section>

    <!-- 온도 변환 섹션 -->
    <section class="converter-section" id="section-temperature">
      <h2 class="section-title">🌡️ 온도 변환</h2>
      <div class="converter-form">
        <input
          type="number"
          id="temperature-input"
          class="value-input"
          placeholder="값 입력"
          step="any"
        />
        <select id="temperature-from" class="unit-select">
          <option value="°C" selected>°C (섭씨)</option>
          <option value="°F">°F (화씨)</option>
          <option value="K">K (켈빈)</option>
        </select>
        <span class="arrow-label">→</span>
        <select id="temperature-to" class="unit-select">
          <option value="°C">°C (섭씨)</option>
          <option value="°F" selected>°F (화씨)</option>
          <option value="K">K (켈빈)</option>
        </select>
        <button class="convert-button" id="temperature-button">변환</button>
        <span class="result-display" id="temperature-result"></span>
      </div>
    </section>

    <!-- 속도 변환 섹션 -->
    <section class="converter-section" id="section-speed">
      <h2 class="section-title">🏎️ 속도 변환</h2>
      <div class="converter-form">
        <input
          type="number"
          id="speed-input"
          class="value-input"
          placeholder="값 입력"
          step="any"
        />
        <select id="speed-from" class="unit-select">
          <option value="km/h" selected>km/h (킬로미터/시)</option>
          <option value="mph">mph (마일/시)</option>
          <option value="m/s">m/s (미터/초)</option>
          <option value="knot">knot (노트)</option>
        </select>
        <span class="arrow-label">→</span>
        <select id="speed-to" class="unit-select">
          <option value="km/h">km/h (킬로미터/시)</option>
          <option value="mph" selected>mph (마일/시)</option>
          <option value="m/s">m/s (미터/초)</option>
          <option value="knot">knot (노트)</option>
        </select>
        <button class="convert-button" id="speed-button">변환</button>
        <span class="result-display" id="speed-result"></span>
      </div>
    </section>

    <!-- 면적 변환 섹션 -->
    <section class="converter-section" id="section-area">
      <h2 class="section-title">📐 면적 (Area)</h2>
      <div class="converter-form">
        <input
          type="number"
          id="area-input"
          class="value-input"
          placeholder="값 입력"
          step="any"
        />
        <select id="area-from" class="unit-select">
          <option value="m2" selected>m² (제곱미터)</option>
          <option value="ft2">ft² (제곱피트)</option>
          <option value="pyeong">평 (평방)</option>
        </select>
        <span class="arrow-label">→</span>
        <select id="area-to" class="unit-select">
          <option value="m2">m² (제곱미터)</option>
          <option value="ft2">ft² (제곱피트)</option>
          <option value="pyeong" selected>평 (평방)</option>
        </select>
        <button class="convert-button" id="area-button">변환</button>
        <span class="result-display" id="area-result"></span>
      </div>
    </section>

    <!-- 데이터 크기 변환 섹션 -->
    <section class="converter-section" id="section-dataSize">
      <h2 class="section-title">💾 데이터 크기</h2>
      <div class="converter-form">
        <input
          type="number"
          id="dataSize-input"
          class="value-input"
          placeholder="값 입력"
          step="any"
        />
        <select id="dataSize-from" class="unit-select">
          <option value="B" selected>B (바이트)</option>
          <option value="KB">KB (킬로바이트)</option>
          <option value="MB">MB (메가바이트)</option>
          <option value="GB">GB (기가바이트)</option>
          <option value="TB">TB (테라바이트)</option>
        </select>
        <span class="arrow-label">→</span>
        <select id="dataSize-to" class="unit-select">
          <option value="B">B (바이트)</option>
          <option value="KB">KB (킬로바이트)</option>
          <option value="MB" selected>MB (메가바이트)</option>
          <option value="GB">GB (기가바이트)</option>
          <option value="TB">TB (테라바이트)</option>
        </select>
        <button class="convert-button" id="dataSize-button">변환</button>
        <span class="result-display" id="dataSize-result"></span>
      </div>
    </section>


    <!-- 동물 소리 버튼 섹션 -->
    <section class="converter-section" id="section-animal-sounds">
      <h2 class="section-title">🔊 동물 소리 버튼</h2>
      <div class="converter-form">
        <button class="animal-button" id="animal-btn-1">🐢 거북이</button>
        <button class="animal-button animal-button-alt" id="animal-btn-2">🦊 여우</button>
        <button class="animal-button animal-button-new" id="animal-btn-3">🐬 돌고래</button>
        <button class="animal-button animal-button-random" id="animal-btn-4">🦉 부엉이</button>
      </div>
    </section>

  </main>

  <!-- 변환 로직 및 DOM 이벤트 바인딩 -->
  <script src="script.js"></script>

</body>
</html>
